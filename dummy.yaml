app:
  name: sample-application
  version: 1.0.0
  environment: development

server:
  host: localhost
  port: 8080
  ssl:
    enabled: false
    certificate: /path/to/cert.pem
    key: /path/to/key.pem

database:
  type: postgresql
  host: db.local
  port: 5432
  name: sample_db
  username: user
  password: password123

logging:
  level: info
  file: logs/app.log
  rotation:
    enabled: true
    max_size_mb: 10
    backups: 5

features:
  - user-authentication
  - data-analytics
  - notifications

users:
  - name: Alice
    role: admin
    email: alice@example.com
  - name: Bob
    role: viewer
    email: bob@example.com

metadata:
  created_at: 2025-11-11T12:00:00Z
  created_by: system
